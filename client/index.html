<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CandleChart</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <span class="logo">CandleChart</span>
    <div class="controls">
      <div class="status-wrap">
        <span id="status-dot" class="dot disconnected"></span>
        <span id="status-text">Disconnected</span>
      </div>
      <select id="mode-select">
        <option value="paper">Paper</option>
        <option value="live">Live</option>
      </select>
      <button id="connect-btn">Connect</button>
      <div class="divider"></div>
      <div class="search-wrap">
        <input id="symbol-input" type="text" placeholder="Search symbol or company…" autocomplete="off" maxlength="60" />
        <div id="search-dropdown" class="search-dropdown hidden"></div>
      </div>
      <div class="divider"></div>
      <button id="scanner-toggle-btn">Scanner</button>
    </div>
  </header>

  <div id="main-wrap">
    <div id="scanner-panel" class="hidden">
      <div class="scanner-header">
        <span class="scanner-title">Market Scanner</span>
      </div>
      <div class="scanner-controls">
        <select id="scanner-location">
          <option value="STK.US">US (all)</option>
          <option value="STK.NASDAQ">NASDAQ</option>
          <option value="STK.NYSE">NYSE</option>
          <option value="STK.EU.SFB">Stockholm (SFB)*</option>
          <option value="STK.EU">EU (all)*</option>
        </select>
        <select id="scanner-code">
          <option value="MOST_ACTIVE">Most Active</option>
          <option value="TOP_PERC_GAIN">Top Gainers %</option>
          <option value="TOP_PERC_LOSE">Top Losers %</option>
          <option value="MOST_ACTIVE_USD">Most Active $</option>
        </select>
        <button id="scanner-scan-btn">Scan</button>
      </div>
      <div id="scanner-results"></div>
    </div>
    <div id="widget-grid"></div>
  </div>

  <div id="toast" class="toast hidden">
    <span id="toast-msg"></span>
    <button id="toast-close" aria-label="Dismiss">✕</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
